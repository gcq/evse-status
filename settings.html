<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVSE Settings</title>
  <link rel="stylesheet" href="style.css">
  <script src="util.js"></script>
  <script src="l10n.js"></script>
  <script>
    try {
      var savedTheme = (JSON.parse(localStorage.getItem("evse_config")) || {}).theme;
      document.documentElement.setAttribute("data-theme", savedTheme || "auto");
    } catch (e) { document.documentElement.setAttribute("data-theme", "auto"); }
    // See index.html's matching inline script for why this runs here.
    document.documentElement.lang = detectLocale();
  </script>
</head>
<body>
  <header>
    <h1>Settings</h1>
    <div class="header-controls">
      <a href="index.html" class="btn btn-secondary" id="back-link">Back</a>
      <button id="save-btn" class="btn btn-primary">Save</button>
      <button id="reset-btn" class="btn btn-ghost">Reset to defaults</button>
    </div>
  </header>
  <main>
    <div id="form-root"></div>
  </main>
  <footer><a id="deploy-info" class="deploy-info" target="_blank" rel="noopener"></a></footer>
  <script src="config.js"></script>
  <script src="adapters/electromaps.js"></script>
  <script src="adapters/evcharge.js"></script>
  <script src="settings.js"></script>
</body>
</html>
