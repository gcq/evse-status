<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Chargers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script>
    try {
      var t = (JSON.parse(localStorage.getItem("evse_config")) || {}).theme;
      document.documentElement.setAttribute("data-theme", t || "auto");
    } catch (e) { document.documentElement.setAttribute("data-theme", "auto"); }
  </script>
</head>
<body>
  <header>
    <h1>Discover Chargers</h1>
    <div class="header-controls">
      <a href="settings.html" class="btn btn-secondary">Back</a>
    </div>
  </header>
  <main style="padding-bottom: 88px">
    <div id="map"></div>
    <div id="geo-banner" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:12px">
      <p id="geo-status" class="discover-status" style="margin-bottom:12px"></p>
      <button id="retry-btn" class="btn btn-primary">Allow location &amp; search</button>
    </div>
    <p id="geo-status-inline" class="discover-status"></p>
    <div id="results"></div>
  </main>
  <button id="add-pins-btn" class="btn btn-primary">Add to My Stations</button>

  <script src="config.js"></script>
  <script src="util.js"></script>
  <script src="adapters/electromaps.js"></script>
  <script src="adapters/evcharge.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="discover.js"></script>
</body>
</html>
